            color: #0062b3;
            margin: 0px;

</head>
<body>

<!--A segunda forma seria aplicar diretamente o estilo no elemento-->
    <p style="color:#ff0000; ">Olá Mundo</h1>

<!--A terceira forma seria incluir no head o link do css e depois incluir o .form3 no arquivo style.css-->

</body>
